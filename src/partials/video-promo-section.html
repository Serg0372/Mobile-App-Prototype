<section class="section video-promo-section">
  <picture class="base-blob video-blob-top" aria-hidden="true">
    <source srcset="/icons/blobs/video-desk-top.svg" media="(min-width: 1280px)" />
    <source srcset="/icons/blobs/video-tab-top.svg" media="(min-width: 768px)" />
    <img class="blob-img" src="/icons/blobs/video-desk-top.svg" alt="" />
  </picture>

  <picture class="base-blob video-blob-bottom" aria-hidden="true">
    <source srcset="/icons/blobs/video-desk.svg" media="(min-width: 1280px)" />
    <source srcset="/icons/blobs/video-tab.svg" media="(min-width: 768px)" />
    <source srcset="/icons/blobs/video-mob.svg" media="(min-width: 320px)" />
    <img class="blob-img" src="/icons/blobs/video-desk.svg" alt="" />
  </picture>

  <div class="container container-video-promo">
    <div class="video-text-box">
      <h2 class="section-title video-title">Watch the video</h2>
      <p class="video-description">
        Watch the video below to see our mobile app in action. With a user-friendly interface, personalized recommendations, secure
        transactions, and real-time updates, our app is available for download on both Apple and Android devices and is designed to make
        your life easier.
      </p>
      <ul class="video-icons-list">
        <li class="video-icon-item">
          <a class="video-icon-link" href="https://www.apple.com/app-store/" target="_blank">
            <svg class="video-icon" width="30" height="36">
              <use href="/icons/sprite.svg#icon-apple"></use>
            </svg>
          </a>
        </li>
        <li class="video-icon-item">
          <a class="video-icon-link" href="https://play.google.com/store/apps" target="_blank">
            <svg class="video-icon" width="32" height="36">
              <use href="/icons/sprite.svg#icon-android"></use>
            </svg>
          </a>
        </li>
      </ul>
    </div>
    <div class="video-promo-box">
      <img
        class="video-img"
        src="/src/img/video/iPhone-d@1x.webp"
        alt="mobile phone in hand with a video playing in the background"
        width="501"
        height="282"
        srcset="/src/img/video/iPhone-d@1x.webp 1x, /src/img/video/iPhone-d@2x.webp 2x"
        srcset="/src/img/video/iPhone-t@1x.webp 1x, /src/img/video/iPhone-t@2x.webp 2x"
        srcset="/src/img/video/iPhone-m@1x.webp 1x, /src/img/video/iPhone-m@2x.webp 2x" />
    </div>
  </div>
</section>
